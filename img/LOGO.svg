<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 520" width="480" height="520">
  <defs>
    <!-- Gradient diagonal : rouge haut-gauche → bleu bas-droite -->
    <linearGradient id="mainGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%"   stop-color="#C0392B"/>
      <stop offset="42%"  stop-color="#9B3A6E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2563A8"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#C0392B"/>
      <stop offset="55%"  stop-color="#3A7EC0"/>
      <stop offset="100%" stop-color="#1D4F7C"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
    <clipPath id="shapeClip">
      <!-- Forme principale : flamme gauche + corps droit -->
      <path d="
        M 158,18
        C 130,35 100,70  92,112
        C  84,152  90,182  82,215
        C  74,248  60,272  62,308
        C  64,355  90,395 130,418
        C 160,435 185,440 210,440
        C 255,440 300,422 325,390
        C 350,358 355,318 345,285
        C 337,258 322,238 326,208
        C 330,178 348,158 344,128
        C 340,100 322, 72 300, 52
        C 285, 38 268, 28 254, 20
        C 238, 10 222, 8 212, 12
        C 202, 16 195, 25 188, 18
        C 180,  8 168,  8 158, 18 Z
      "/>
    </clipPath>
  </defs>

  <!-- ===== CORPS PRINCIPAL ===== -->
  <g filter="url(#shadow)">
    <!-- Fond bleu (corps) -->
    <path d="
      M 158,18
      C 130,35 100,70  92,112
      C  84,152  90,182  82,215
      C  74,248  60,272  62,308
      C  64,355  90,395 130,418
      C 160,435 185,440 210,440
      C 255,440 300,422 325,390
      C 350,358 355,318 345,285
      C 337,258 322,238 326,208
      C 330,178 348,158 344,128
      C 340,100 322, 72 300, 52
      C 285, 38 268, 28 254, 20
      C 238, 10 222, 8 212, 12
      C 202, 16 195, 25 188, 18
      C 180,  8 168,  8 158, 18 Z
    " fill="url(#bodyGrad)"/>

    <!-- Flamme rouge gauche (superposée) -->
    <path d="
      M 158,18
      C 138,32 112,60  98,96
      C  86,128  90,158  86,185
      C  82,210  76,228  82,248
      C  98,235 120,225 145,220
      C 170,215 195,215 210,220
      C 200,190 190,165 192,138
      C 195,108 210, 72 220, 52
      C 210, 60 202, 78 196, 95
      C 190, 78 182, 58 174, 42
      C 168, 28 162, 18 158, 18 Z
    " fill="#C0392B"/>

    <!-- Flamme rouge fondue vers le bas -->
    <path d="
      M 158,18
      C 130,35 100,70  92,112
      C  84,148  88,178  82,210
      C 100,198 126,220 148,230
      C 168,218 188,214 210,220
      C 195,195 186,168 190,140
      C 193,110 208, 72 220, 52
      C 205, 62 196, 84 192,102
      C 186, 82 178, 58 168, 38
      C 162, 24 158, 18 158, 18 Z
    " fill="#C0392B" opacity="0.55"/>
  </g>

  <!-- ===== MONTAGNES BLANCHES ===== -->
  <g clip-path="url(#shapeClip)">
    <path d="
      M  55,320
      L 128,208
      L 168,255
      L 210,185
      L 252,255
      L 292,208
      L 362,320
      L 362,345
      L  55,345 Z
    " fill="white" opacity="0.95"/>
    <!-- Reflets neige -->
    <path d="M 210,185 L 228,222 L 210,212 L 192,222 Z" fill="white"/>
    <path d="M 128,208 L 144,230 L 128,224 L 112,230 Z" fill="white" opacity="0.7"/>
    <path d="M 292,208 L 308,230 L 292,224 L 276,230 Z" fill="white" opacity="0.7"/>
  </g>

  <!-- ===== CLÉ À MOLETTE (wrench open-end) ===== -->
  <g clip-path="url(#shapeClip)">
    <!--
      Clé orientée : ouverture en haut-gauche, manche vers bas-droite
      Centre vers (165, 375), angle ~-40°
    -->
    <g transform="translate(168,372) rotate(-42)">
      <!-- Manche -->
      <rect x="-13" y="-20" width="26" height="120" rx="9" fill="white" opacity="0.92"/>
      <!-- Tête gauche de la mâchoire -->
      <path d="
        M -13,-20
        C -33,-20 -48,-8 -48, 8
        C -48, 20 -40, 28 -28, 30
        L -13, 32 L -13,-20 Z
      " fill="white" opacity="0.92"/>
      <!-- Tête droite de la mâchoire -->
      <path d="
        M  13,-20
        C  33,-20  48,-8  48, 8
        C  48, 20  40, 28  28, 30
        L  13, 32 L  13,-20 Z
      " fill="white" opacity="0.92"/>
      <!-- Fente entre les mâchoires (ombre) -->
      <rect x="-50" y="4" width="100" height="9" rx="3" fill="#1D4F7C" opacity="0.45"/>
      <!-- Embout arrondi bas -->
      <ellipse cx="0" cy="100" rx="16" ry="16" fill="white" opacity="0.92"/>
      <ellipse cx="0" cy="100" rx="8"  ry="8"  fill="#2563A8" opacity="0.5"/>
    </g>
  </g>
</svg>
